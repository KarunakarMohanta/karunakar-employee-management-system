<div style="background: yellow; padding: 10px; margin: 10px; text-align: center;">
  <strong>DEBUG:</strong> isLoading={{ isLoading }} | errorMessage={{ errorMessage || 'none' }} | employee.name={{ employee?.name || 'EMPTY' }}
</div>

<!-- Edit Form - Show only when employee has data -->
<div class="edit-container" *ngIf="!isLoading && !errorMessage && employee && employee.name">
  <div class="edit-card">
    <h2>✏️ Edit Employee</h2>
    
    <form (ngSubmit)="updateEmployee($event)">
      
      <div class="form-group">
        <label>👤 Full Name</label>
        <input 
          type="text" 
          [(ngModel)]="employee.name" 
          name="name" 
          required
          placeholder="Enter full name"
        >
      </div>
      
      <div class="form-group">
        <label>📧 Email Address</label>
        <input 
          type="email" 
          [(ngModel)]="employee.email" 
          name="email" 
          required
          placeholder="Enter email address"
        >
      </div>
      
      <div class="form-group">
        <label>📱 Mobile Number</label>
        <input 
          type="tel" 
          [(ngModel)]="employee.mobileNumber" 
          name="mobileNumber"
          placeholder="Enter 10-digit mobile number"
          maxlength="10"
        >
      </div>
      
      <div class="form-group">
        <label>📅 Joining Date</label>
        <input 
          type="date" 
          [(ngModel)]="employee.joiningDate" 
          name="joiningDate"
        >
      </div>
      
      <div class="form-group">
        <label>🏢 Department</label>
        <input 
          type="text" 
          [(ngModel)]="employee.department" 
          name="department" 
          required
          placeholder="Enter department"
        >
      </div>
      
      <div class="form-group">
        <label>💰 Salary</label>
        <input 
          type="number" 
          [(ngModel)]="employee.salary" 
          name="salary" 
          required
          placeholder="Enter salary"
        >
      </div>
      
      <div class="button-group">
        <button type="submit" class="update-btn">💾 Update Employee</button>
        <button type="button" class="cancel-btn" (click)="cancel()">❌ Cancel</button>
      </div>
      
    </form>
  </div>
</div>

<!-- Loading State -->
<div class="loading-container" *ngIf="isLoading">
  <div class="spinner"></div>
  <p>Loading employee data...</p>
</div>

<!-- Error State -->
<div class="error-container" *ngIf="!isLoading && errorMessage">
  <div class="error-card">
    <h2>⚠️ Error</h2>
    <p>{{ errorMessage }}</p>
    <button class="cancel-btn" (click)="cancel()">Go Back</button>
  </div>
</div>

<!-- If employee loaded but no name -->
<div class="error-container" *ngIf="!isLoading && !errorMessage && (!employee || !employee.name)">
  <div class="error-card">
    <h2>⚠️ No Data</h2>
    <p>Employee data could not be loaded properly.</p>
    <p>Debug: employee = {{ employee | json }}</p>
    <button class="cancel-btn" (click)="cancel()">Go Back</button>
  </div>
</div>
